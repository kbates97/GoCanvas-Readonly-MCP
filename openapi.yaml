  /tracker/locations:
    get:
      tags:
      - Locations
      summary: List all Locations
      operationId: list_all_locations
      description: Retrieve the location events captured for a user within a limited date range. e.g a
        specific time during the day Retrieve the location events captured for a user spanning multiple
        days
      parameters:
      - name: user_id
        in: query
        required: false
        schema:
          type: integer
        description: Optional. Limit results to a specific user in your company. Omit to retrieve events
          for all users in your company.
      - name: start_date
        in: query
        required: true
        schema:
          type: string
        description: Required. Beginning of the window to search. When only a date is provided, it is
          interpreted as 00:00:00 for that day.
      - name: end_date
        in: query
        required: true
        schema:
          type: string
        description: Required. End of the window to search. When only a date is provided, it is interpreted
          as 23:59:59 for that day.
      - name: page
        in: query
        required: false
        schema:
          type: integer
        description: The page requested, see Pagination.
      - name: use_created_at
        in: query
        required: false
        schema:
          type: boolean
        description: When true, filter and sort records using their created_at timestamp instead of recorded_at.
          Use this to pull all events that were uploaded during a window, even if they were recorded earlier.
      responses:
        '200':
          description: Successful response
        '401':
          description: Unauthorized
        '422':
          description: Unprocessable Entity
