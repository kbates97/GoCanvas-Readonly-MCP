openapi: 3.0.3
info:
  title: GoCanvas API
  version: v3
  description: OpenAPI specification for the GoCanvas REST API (v3), generated from the official API reference
    documentation. GoCanvas lets you manage customers, forms, submissions, dispatches, users, and more.
  contact:
    name: GoCanvas
    url: https://www.gocanvas.com
servers:
- url: https://api.gocanvas.com/api/v3
  description: Production
security:
- bearerAuth: []
- basicAuth: []
tags:
- name: Overview
  description: GoCanvas API versioning follows semantic versioning, treating the published number as a
    "major" release. As such, best efforts will be made to introduce changes in a reverse-compatible way.
- name: Customer
  description: Defines a customer's contact information and can either be an individual or a business
    entity. A Customer is optionally associated with a Site.
- name: Department
  description: A Department represents an organizational unit within a Company. Users can be assigned
    to one or multiple Departments. Forms created in one Department can be shared with another.
- name: Dispatch
  description: A Dispatch is a pre-populated set of responses to a Form that will become a Submission
    once the dispatched user completes the Form. Dispatches also have additional capabilities such as
    scheduling and notifications. Dispatches will closely resemble Submissions.
- name: Form
  description: A Form is how you capture data with GoCanvas. It defines all data you wish to collect.
- name: Group
  description: Groups allow for the organization of users and can be assigned Forms. Groups are a useful
    way to organize teams, job functions, or common workflows and manage Form assignments in one place
    rather than individually assigning Forms to each User. Learn more about GoCanvas Groups.
- name: Me
  description: The /me endpoint is useful for OAuth-authenticated applications to verify the current token's
    user information and retrieve basic profile data. It can also be helpful to retrieve company_id and
    default_department_id for subsequent API calls.
- name: Project
  description: A Project is created and used to track the progress of a specific task or job. A Project
    is associated with a Department, and optionally a Customer and Site. A Project can have a status of
    active, inactive, or draft.
- name: Reference Data
  description: 'Reference Data is data that is used to populate dropdowns, checkboxes, and other controls
    in a Form. The two main purposes of Reference Data are to:'
- name: Report
  description: Reports assemble Submission data in the desired presentation format (e.g. a PDF) according
    to their Report Definition. Forms and Submissions may have multiple Report Definitions.
- name: Locations
  description: Use the Locations endpoint to retrieve the sequence of location events captured by Tracker.
    You can scope the results to a single mobile user or, by omitting the user_id, retrieve activity for
    every user in your company.
- name: Site
  description: A site represents a physical location where work is conducted. To create a site, the user
    must have authorization to create a site for the associated company.
- name: Submission
  description: A Submission is a set of responses to a Form. Submissions are how GoCanvas clients transmit
    collected data.
- name: User
  description: A User is a GoCanvas user who belongs to a specific Company. To ensure proper access and
    permissions, each User must be assigned a valid Company role.
- name: Values
  description: Values represent the data that is collected in a submission. Most values will be in-line
    within the Retrieve a Submission response. Values for media fields (photos, videos, or attachments)
    must be downloaded individually using this method.
- name: Webhooks
  description: Webhooks are a customizable Integration Option that will notify your back end services
    of GoCanvas events in real time when you have time-sensitive needs based on your Form events.
paths:
  /oauth/token:
    post:
      tags:
      - Overview
      summary: 'Authentication: Bearer'
      operationId: authentication_bearer
      description: 'GoCanvas supports OAuth 2.0 authentication to retrieve a short-lived token for API
        access. This token can then be passed in the Authorization HTTP header as a Bearer token to authenticate
        requests. To use Bearer authentication, you must first create an OAuth application in your profile.
        GoCanvas offers two OAuth 2.0 flows:'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                  expires_in:
                    type: integer
                  scope:
                    type: string
                  created_at:
                    type: integer
              example:
                access_token: 30puVebCmI7wbVjIQPt1KIYE81voxKdkKZwSaCWRiZM
                token_type: Bearer
                expires_in: 7200
                scope: api
                created_at: 1733346054
        '401':
          description: Unauthorized
        '422':
          description: Unprocessable Entity
      security: []
  /customers:
    get:
      tags:
      - Customer
      summary: List all Customers
      operationId: list_all_customers
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
        description: The page requested, see Pagination
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    type:
                      type: string
                    customer_type:
                      type: string
                    business_name:
                      type: string
                      nullable: true
                    contact_role:
                      type: string
                      nullable: true
                    contact_first_name:
                      type: string
                    contact_last_name:
                      type: string
                    contact_email:
                      type: string
                    contact_phone:
                      type: string
                    contact_preference:
                      type: string
                      nullable: true
                    notes:
                      type: string
                      nullable: true
                    default_site_id:
                      type: integer
                    code:
                      type: string
              example:
              - id: 10
                type: customer
                customer_type: individual
                business_name: null
                contact_role: null
                contact_first_name: Ben
                contact_last_name: Jackson
                contact_email: ben.jackson@example.com
                contact_phone: '5555555555'
                contact_preference: null
                notes: null
                default_site_id: 1
                code: NEW00001
              - id: 11
                type: customer
                customer_type: business
                business_name: Chichago Inc
                contact_role: null
                contact_first_name: Jessica
                contact_last_name: Nixon
                contact_email: jessica.nixon@example.com
                contact_phone: '4444444444'
                contact_preference: null
                notes: null
                default_site_id: null
                code: NEW00002
              - id: 12
                type: customer
                customer_type: individual
                business_name: null
                contact_role: null
                contact_first_name: Sam
                contact_last_name: Johnson
                contact_email: sam.johnson@example.com
                contact_phone: '3333333333'
                contact_preference: null
                notes: null
                default_site_id: 3
                code: NEW00003
        '401':
          description: Unauthorized
        '422':
          description: Unprocessable Entity
    post:
      tags:
      - Customer
      summary: Create a Customer
      operationId: create_a_customer
      description: To create a new Customer, the POST body can be sent as JSON. The customer_type field
        is required. If customer_type is individual, you must also provide contact_first_name and contact_last_name.
        If customer_type is business, you must also provide business_name.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customer_type:
                  type: string
                  enum:
                  - individual
                  - business
                  description: The type of the Customer. Can be individual or business
                business_name:
                  type: string
                  description: The name of the business, if the customer_type is a business
                contact_role:
                  type: string
                  description: The role of the contact person for the Customer
                contact_first_name:
                  type: string
                  description: The first name of the contact person for the Customer
                contact_last_name:
                  type: string
                  description: The last name of the contact person for the Customer
                contact_email:
                  type: string
                  description: The email address of the contact person for the Customer
                contact_phone:
                  type: string
                  description: The phone number of the contact person for the Customer
                contact_preference:
                  type: string
                  description: The preferred method of contact for the Customer
                notes:
                  type: string
                  description: A longer string value to describe the Customer
                code:
                  type: string
                  description: An alpha numeric code to uniquely identify the Customer
              required:
              - customer_type
            example:
              customer_type: business
              business_name: LLC Renovation
              contact_first_name: Sean
              contact_last_name: Mitchel
              contact_email: sean.mitchel@example.com
              contact_phone: '3334445555'
              code: NEW00001
              site_id: 7
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  type:
                    type: string
                  customer_type:
                    type: string
                  business_name:
                    type: string
                  contact_role:
                    type: string
                    nullable: true
                  contact_first_name:
                    type: string
                  contact_last_name:
                    type: string
                  contact_email:
                    type: string
                  contact_phone:
                    type: string
                  contact_preference:
                    type: string
                    nullable: true
                  notes:
                    type: string
                    nullable: true
                  default_site_id:
                    type: integer
                  code:
                    type: string
              example:
                id: 14
                type: customer
                customer_type: business
                business_name: LLC Renovation
                contact_role: null
                contact_first_name: Sean
                contact_last_name: Mitchel
                contact_email: sean.mitchel@example.com
                contact_phone: '3334445555'
                contact_preference: null
                notes: null
                default_site_id: 7
                code: NEW00001
        '401':
          description: Unauthorized
        '422':
          description: Unprocessable Entity
  /customers/{customer_id}:
    get:
      tags:
      - Customer
      summary: Retrieve a Customer
      operationId: retrieve_a_customer
      parameters:
      - name: customer_id
        in: path
        required: true
        schema:
          type: integer
        example: 10
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  type:
                    type: string
                  customer_type:
                    type: string
                  business_name:
                    type: string
                    nullable: true
                  contact_role:
                    type: string
                    nullable: true
                  contact_first_name:
                    type: string
                  contact_last_name:
                    type: string
                  contact_email:
                    type: string
                  contact_phone:
                    type: string
                  contact_preference:
                    type: string
                    nullable: true
                  notes:
                    type: string
                    nullable: true
                  default_site_id:
                    type: integer
                  code:
                    type: string
              example:
                id: 10
                type: customer
                customer_type: individual
                business_name: null
                contact_role: null
                contact_first_name: Ben
                contact_last_name: Jackson
                contact_email: ben.jackson@example.com
                contact_phone: '5555555555'
                contact_preference: null
                notes: null
                default_site_id: 1
                code: NEW00001
        '401':
          description: Unauthorized
        '422':
          description: Unprocessable Entity
    patch:
      tags:
      - Customer
      summary: Update a Customer
      operationId: update_a_customer
      description: To update an existing Customer, the PATCH request body can be sent as JSON.
      parameters:
      - name: customer_id
        in: path
        required: true
        schema:
          type: integer
        example: 14
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customer_type:
                  type: string
                  enum:
                  - individual
                  - business
                  description: The type of the Customer. Can be individual or business
                business_name:
                  type: string
                  description: The name of the business, if the customer_type is a business
                contact_role:
                  type: string
                  description: The role of the contact person for the Customer
                contact_first_name:
                  type: string
                  description: The first name of the contact person for the Customer
                contact_last_name:
                  type: string
                  description: The last name of the contact person for the Customer
                contact_email:
                  type: string
                  description: The email address of the contact person for the Customer
                contact_phone:
                  type: string
                  description: The phone number of the contact person for the Customer
                contact_preference:
                  type: string
                  description: The preferred method of contact for the Customer
                notes:
                  type: string
                  description: A longer string value to describe the Customer
                default_site_id:
                  type: integer
                  description: The ID of the default site associated with the Customer. When multiple
                    site_ids are provided this field denotes the Primary Site.
                code:
                  type: string
                  description: An alpha numeric code to uniquely identify the Customer
                site_ids:
                  type: array
                  description: Sites IDs for adding Sites to the Customer. When more than one Site is
                    provided, the first will be used unless a default_site_id is specified
              required:
              - customer_type
            example:
              default_site_id: 12
              notes: Unit renovation
              site_ids:
              - 10
              - 11
              - 12
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: Customer updated successfully
        '401':
          description: Unauthorized
        '422':
          description: Unprocessable Entity
    delete:
      tags:
      - Customer
      summary: Delete a Customer
      operationId: delete_a_customer
      description: A Customer can be deleted with a DELETE request. By default, the DELETE request will
        soft-delete the Customer, which preserves the Customer data but hides it from the web views. To
        permanently delete a Customer, use the hard_delete=true parameter, e.g. DELETE https://www.gocanvas.com/api/v3/customers/14?hard_delete=true.
      parameters:
      - name: customer_id
        in: path
        required: true
        schema:
          type: integer
        example: 14
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
  /departments:
    get:
      tags:
      - Department
      summary: List all Departments
      operationId: list_all_departments
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    type:
                      type: string
                    name:
                      type: string
                    description:
                      type: string
                    created_at:
                      type: string
                      nullable: true
              example:
              - id: -1
                type: department
                name: All
                description: All
                created_at: null
              - id: 111
                type: department
                name: First Department
                description: My first department
                created_at: 2023-05-31 15:34:47 UTC
              - id: 112
                type: department
                name: Second Department
                description: A second department
                created_at: 2023-05-31 16:24:28 UTC
              - id: 113
                type: department
                name: Third Department
                description: My third department
                created_at: 2023-05-31 16:27:30 UTC
        '401':
          description: Unauthorized
        '422':
          description: Unprocessable Entity
    post:
      tags:
      - Department
      summary: Create a Department
      operationId: create_a_department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: A short string value for name of a new Department
                description:
                  type: string
                  description: A longer string value describing a new Department
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  type:
                    type: string
                  name:
                    type: string
                  description:
                    type: string
                  created_at:
                    type: string
              example:
                id: 114
                type: department
                name: My New Department
                description: This is a new department
                created_at: 2023-06-02 13:43:08 UTC
        '401':
          description: Unauthorized
        '422':
          description: Unprocessable Entity
  /departments/{department_id}/users:
    get:
      tags:
      - Department
      summary: List all Department Users
      operationId: list_all_department_users
      parameters:
      - name: department_id
        in: path
        required: true
        schema:
          type: integer
        example: 1999
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    user:
                      type: object
                      properties:
                        id:
                          type: integer
                        first_name:
                          type: string
                        last_name:
                          type: string
                        email:
                          type: string
                        enabled:
                          type: boolean
                    department_role:
                      type: string
                    created_at:
                      type: string
                    updated_at:
                      type: string
              example:
              - type: department_user
                user:
                  id: 5486
                  first_name: Jane
                  last_name: Doe
                  email: jane.doe@gocanvas.com
                  enabled: true
                department_role: department_user
                created_at: 2022-09-13 17:02:49 UTC
                updated_at: 2022-09-13 17:02:49 UTC
              - type: department_user
                user:
                  id: 5490
                  first_name: Smith
                  last_name: Kane
                  email: smith.kane@gocanvas.com
                  enabled: false
                department_role: department_admin
                created_at: 2022-09-13 17:02:49 UTC
                updated_at: 2022-09-13 17:02:49 UTC
        '401':
          description: Unauthorized
        '422':
          description: Unprocessable Entity
    post:
      tags:
      - Department
      summary: Add a User to a Department
      operationId: add_a_user_to_a_department
      parameters:
      - name: department_id
        in: path
        required: true
        schema:
          type: integer
        example: 1999
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: integer
                  description: The id of the User to add
                department_role:
                  type: string
                  description: A string matching a valid departmental role
            example:
              user_id: 5491
              department_role: department_user
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  department_role:
                    type: string
                  created_at:
                    type: string
                  updated_at:
                    type: string
                  user_id:
                    type: integer
                  department_id:
                    type: integer
              example:
                type: department_user
                department_role: department_user
                created_at: 2023-05-31 14:36:04 UTC
                updated_at: 2023-05-31 14:36:04 UTC
                user_id: 5491
                department_id: 1999
        '401':
          description: Unauthorized
        '422':
          description: Unprocessable Entity
  /dispatches:
    get:
      tags:
      - Dispatch
      summary: List all Dispatches
      operationId: list_all_dispatches
      description: Users can retrieve a list of all Dispatches that they have access to. Required parameters
        are user_id, department_id, or form_id.
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
        description: The page requested, see Pagination
      - name: user_id
        in: query
        required: true
        schema:
          type: integer
        description: The identifier for the User assigned the Dispatch
      - name: department_id
        in: query
        required: true
        schema:
          type: integer
        description: The identifier for the Department associated with the Dispatch
      - name: form_id
        in: query
        required: true
        schema:
          type: integer
        description: The identifier for the Form associated with Dispatch
      - name: status
        in: query
        required: false
        schema:
          type: string
          enum:
          - unassigned
          - assigned
          - received
        description: The status of the Dispatch. Can be unassigned,assigned, or received
      - name: start_date
        in: query
        required: false
        schema:
          type: string
        description: A DateTime value for the beginning bounds to filter the Dispatches' created_at
      - name: end_date
        in: query
        required: false
        schema:
          type: string
        description: A DateTime value for the ending bounds to filter the Dispaches' created_at
      - name: scheduled_start_date
        in: query
        required: false
        schema:
          type: string
        description: A DateTime value for the beginning bounds to filter the Dispatches' scheduled_at
      - name: scheduled_end_date
        in: query
        required: false
        schema:
          type: string
        description: A DateTime value for the ending bounds to filter the Dispaches' scheduled_end
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    type:
                      type: string
                    form_id:
                      type: integer
                    user_id:
                      type: integer
                    department_id:
                      type: integer
                    customer_id:
                      type: string
                      nullable: true
                    project_id:
                      type: string
                      nullable: true
                    site_id:
                      type: string
                      nullable: true
                    submission_id:
                      type: string
                      nullable: true
                    name:
                      type: string
                    description:
                      type: string
                    status:
                      type: string
                    scheduled_at:
                      type: string
                    scheduled_end:
                      type: string
                    sent_at:
                      type: string
                      nullable: true
                    completed_at:
                      type: string
                      nullable: true
                    deleted_at:
                      type: string
                      nullable: true
                    send_calendar_invite:
                      type: boolean
                    reminder_interval:
                      type: integer
                    created_at:
                      type: string
              example:
              - id: 194780
                type: dispatch_item
                form_id: 346103
                user_id: 840365
                department_id: 11942
                customer_id: null
                project_id: null
                site_id: null
                submission_id: null
                name: Repair request
                description: 123 Main St Service Request
                status: assigned
                scheduled_at: '2024-10-01T08:00:00Z'
                scheduled_end: '2024-12-01T12:00:00Z'
                sent_at: null
                completed_at: null
                deleted_at: null
                send_calendar_invite: true
                reminder_interval: 60
                created_at: '2024-11-11T21:09:02Z'
              - id: 194781
                type: dispatch_item
                form_id: 346103
                user_id: 840365
                department_id: 11942
                customer_id: null
                project_id: null
                site_id: null
                submission_id: null
                name: Fence repair request
                description: 123 Main St Service Request
                status: assigned
                scheduled_at: '2024-12-03T08:00:00Z'
                scheduled_end: '2024-12-03T10:00:00Z'
                sent_at: null
                completed_at: null
                deleted_at: null
                send_calendar_invite: true
                reminder_interval: 60
                created_at: '2024-11-11T21:09:02Z'
              - id: 194782
                type: dispatch_item
                form_id: 346103
                user_id: 840365
                department_id: 11942
                customer_id: null
                project_id: null
                site_id: null
                submission_id: null
                name: Tree trimming request
                description: 123 Main St Service Request
                status: assigned
                scheduled_at: '2024-12-06T08:00:00Z'
                scheduled_end: '2024-12-06T12:00:00Z'
                sent_at: null
                completed_at: null
                deleted_at: null
                send_calendar_invite: true
                reminder_interval: 60
                created_at: '2024-11-11T21:09:02Z'
        '401':
          description: Unauthorized
        '422':
          description: Unprocessable Entity
    post:
      tags:
      - Dispatch
      summary: Customers, Projects, and Sites
      operationId: customers_projects_and_sites
      description: Dispatches may be created and associated with Customers, Projects, or Sites. This allows
        for Dispatches to be organized and tracked within the Project Management Views. Dispatches associated
        with Customers, Projects, or Sites support the same parameters as Dispatches without associations
        such as loops and scheduling. Additional parameters such as customer_id are used to create the
        association.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  type: string
                  description: The JSON Dispatch body
                assignee_id:
                  type: integer
                  description: The identifier for the User assigned the Dispatch; when this is not provided,
                    the Dispatch remains unassigned
                name:
                  type: string
                  description: A short name for the Dispatch displayed on the Dispatch Calendar and the
                    assigned user's calendar invitation
                description:
                  type: string
                  description: A short description of the Dispatch displayed on the assigned user's mobile
                    device
                dispatch_type:
                  type: string
                  enum:
                  - immediate_dispatch
                  - scheduled_dispatch
                  description: The type of the Dispatch. Can be immediate_dispatch or scheduled_dispatch
                form_id:
                  type: integer
                  description: The identifier to specify a Form
                customer_id:
                  type: integer
                  description: The identifier of the Customer to associate the Dispatch with
                project_id:
                  type: integer
                  description: The identifier of the Project to associate the Dispatch with
                site_id:
                  type: integer
                  description: The identifier of the Site to associate the Dispatch with
                responses[]:
                  type: array
                  description: A collection of responses against Form Entries used to pre-populate the
